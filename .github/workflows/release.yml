name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: ./script/validate-release-tag.sh "${GITHUB_REF_NAME}"
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - run: make test-cover
      - run: make lint
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: antiwork/homebrew-cli
          path: .tap/homebrew-cli
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          fetch-depth: 0
      - name: Update Homebrew tap
        run: ./script/update-homebrew-tap.sh "${GITHUB_REF_NAME}" dist/checksums.txt .tap/homebrew-cli
      - name: Publish Homebrew tap changes
        working-directory: .tap/homebrew-cli
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update gumroad to ${GITHUB_REF_NAME}"
          git push origin HEAD:main
